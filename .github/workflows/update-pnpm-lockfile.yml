name: Regenerate pnpm lockfile after Dependabot merge

# Dependabot updates package.json but writes a package-lock.json (npm format).
# This workflow opens a follow-up PR that regenerates pnpm-lock.yaml from the
# updated package.json, keeping the repo consistent for pnpm users.
# A PR is used instead of a direct push to respect branch-protection rules.

on:
  push:
    branches: [main, capital]

jobs:
  update-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate pnpm-lock.yaml
        run: pnpm install --no-frozen-lockfile

      - name: Open PR with updated lockfile
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: regenerate pnpm-lock.yaml after Dependabot update"
          branch: chore/pnpm-lockfile-${{ github.ref_name }}
          delete-branch: true
          base: ${{ github.ref_name }}
          title: "chore: regenerate pnpm-lock.yaml (${{ github.ref_name }})"
          body: |
            Dependabot updated `package.json` but writes an npm-format lockfile.
            This PR regenerates `pnpm-lock.yaml` to match the bumped dependency versions.

            _Auto-generated by the Regenerate pnpm lockfile workflow._
          labels: dependencies
