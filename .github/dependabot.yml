version: 2
updates:

  # ── npm packages → main ──────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: main
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # ── npm packages → capital ───────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: capital
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # ── GitHub Actions → main ────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: main

  # ── GitHub Actions → capital ─────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: capital

  # ── Docker base image → main ─────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: main
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  # ── Docker base image → capital ───────────────────────────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: capital
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
